services:
  hermes-gateway:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-gateway
    restart: unless-stopped
    ports:
      - "${MASTER_PORT:-8642}:8642"
      - "${JUDGE_PORT:-8643}:8643"
      - "${REVIEWER_PORT:-8644}:8644"
      - "${PM_PORT:-8645}:8645"
      - "${DEV_PORT:-8646}:8646"
      - "${QA_PORT:-8647}:8647"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:?err}
      - TERMINAL_ENV=${TERMINAL_ENV:-local}
      - SSH_HOST=${SSH_HOST}
      - SSH_USER=${SSH_USER}
    volumes:
      - hermes-data:/opt/data
      - ./docker/hermes/templates:/opt/data/templates:ro
      - ~/.ssh/id_ed25519:/home/hermes/.ssh/id_ed25519:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  hermes-data:
